<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthX AI Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root[data-theme="dark"] {
      --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #111;
      --border: #2a2a2a; --border2: #333;
      --text: #e8e8e8; --text2: #aaa; --text3: #888;
      --accent: #e8a87c; --accent2: #2a1f3d; --accent3: #3d2f5a;
      --user-bg: #2a1f3d; --user-border: #3d2f5a;
      --table-head: #1f1f1f; --table-row: #161616; --table-alt: #131313;
      --shadow: rgba(0,0,0,0.4);
    }
    :root[data-theme="light"] {
      --bg: #f5f5f5; --bg2: #ffffff; --bg3: #f0f0f0;
      --border: #e0e0e0; --border2: #ccc;
      --text: #1a1a1a; --text2: #444; --text3: #888;
      --accent: #d4723a; --accent2: #fff3ec; --accent3: #fde8d8;
      --user-bg: #ede8f8; --user-border: #c9b8f0;
      --table-head: #f0f0f0; --table-row: #fafafa; --table-alt: #f5f5f5;
      --shadow: rgba(0,0,0,0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.2s, color 0.2s, border-color 0.2s; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Login ── */
    #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .login-box { background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; padding: 40px; width: 360px; display: flex; flex-direction: column; gap: 16px; box-shadow: 0 20px 60px var(--shadow); }
    .login-box h2 { font-size: 22px; color: var(--accent); text-align: center; }
    .login-box p { font-size: 13px; color: var(--text3); text-align: center; }
    .login-box input { padding: 11px 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
    .login-box input:focus { border-color: var(--accent); }
    .login-btn { padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
    .login-error { color: #e05555; font-size: 13px; text-align: center; display: none; }

    /* ── Layout ── */
    .app { display: flex; flex-direction: column; height: 100vh; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 17px; font-weight: 700; color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .icon-btn { background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; padding: 6px 10px; color: var(--text2); cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 5px; }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .user-badge { font-size: 12px; color: var(--text3); background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; }

    /* ── DB Selector ── */
    .db-bar { display: flex; align-items: center; gap: 8px; padding: 8px 20px; border-bottom: 1px solid var(--border); background: var(--bg3); flex-shrink: 0; overflow-x: auto; }
    .db-label { font-size: 12px; color: var(--text3); white-space: nowrap; }
    .db-chip { display: flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border2); background: var(--bg2); color: var(--text2); font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .db-chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent2); }
    .db-chip:hover:not(.active) { border-color: var(--text3); }
    .db-status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .db-status-dot.connected { background: #4caf50; box-shadow: 0 0 5px #4caf50; }
    .db-status-dot.error { background: #e05555; box-shadow: 0 0 5px #e05555; }
    .db-status-dot.pending { background: var(--text3); animation: pulse 1.5s infinite; }
    .db-chip-del { margin-left: 2px; opacity: 0; font-size: 10px; }
    .db-chip:hover .db-chip-del { opacity: 0.6; }
    .db-add { padding: 4px 10px; border-radius: 20px; border: 1px dashed var(--border2); background: transparent; color: var(--text3); font-size: 12px; cursor: pointer; }
    .db-add:hover { border-color: var(--accent); color: var(--accent); }
    .db-test-status { font-size: 12px; padding: 6px 10px; border-radius: 6px; text-align: center; }
    .db-test-status.ok { background: rgba(76,175,80,0.1); color: #4caf50; border: 1px solid rgba(76,175,80,0.3); }
    .db-test-status.fail { background: rgba(224,85,85,0.1); color: #e05555; border: 1px solid rgba(224,85,85,0.3); }
    .db-test-status.testing { background: var(--bg3); color: var(--text3); border: 1px solid var(--border2); }

    /* ── Main ── */
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 240px; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; background: var(--bg3); }
    .sidebar-header { padding: 12px 14px; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .new-chat-btn { font-size: 18px; cursor: pointer; color: var(--accent); background: none; border: none; }
    .history-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
    .history-item { padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid transparent; }
    .history-item:hover { background: var(--bg2); border-color: var(--border); }
    .history-item.active { background: var(--bg2); border-color: var(--accent); color: var(--accent); }
    .history-item-del { float: right; color: var(--text3); font-size: 11px; display: none; }
    .history-item:hover .history-item-del { display: inline; }

    /* ── Alerts Panel ── */
    .alerts-panel { padding: 8px; border-top: 1px solid var(--border); }
    .alerts-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 4px 6px; display: flex; justify-content: space-between; }
    .alert-item { font-size: 12px; color: var(--text2); padding: 6px 8px; background: var(--bg2); border-radius: 6px; margin-bottom: 4px; border-left: 3px solid var(--accent); display: flex; justify-content: space-between; }
    .alert-add { font-size: 11px; color: var(--accent); cursor: pointer; background: none; border: none; }

    /* ── Chat ── */
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
    .empty-state { margin: auto; text-align: center; max-width: 500px; }
    .empty-state h2 { font-size: 26px; color: var(--accent); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; color: var(--text3); margin-bottom: 24px; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .suggestion { padding: 8px 14px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 20px; color: var(--text2); cursor: pointer; font-size: 13px; }
    .suggestion:hover { border-color: var(--accent); color: var(--accent); }
    .message { display: flex; gap: 12px; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { flex-direction: row-reverse; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--bg2); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .message-body { max-width: 80%; display: flex; flex-direction: column; gap: 8px; }
    .message.user .message-body { align-items: flex-end; }
    .content { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.65; background: var(--bg2); border: 1px solid var(--border); white-space: pre-wrap; word-break: break-word; }
    .message.user .content { background: var(--user-bg); border-color: var(--user-border); }
    .tool-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 3px 8px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; color: var(--text3); }

    /* ── Result Table ── */
    .result-table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); margin-top: 4px; }
    .result-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .result-table th { padding: 7px 10px; background: var(--table-head); color: var(--text2); text-align: left; border-bottom: 1px solid var(--border); font-weight: 600; white-space: nowrap; }
    .result-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); color: var(--text); }
    .result-table tr:nth-child(even) td { background: var(--table-alt); }
    .result-table tr:hover td { background: var(--bg2); }
    .table-footer { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; background: var(--bg3); border-top: 1px solid var(--border); border-radius: 0 0 8px 8px; }
    .table-count { font-size: 11px; color: var(--text3); }
    .export-btn { font-size: 11px; color: var(--accent); cursor: pointer; background: none; border: 1px solid var(--accent); border-radius: 4px; padding: 2px 8px; }
    .export-btn:hover { background: var(--accent); color: #fff; }

    /* ── Chart ── */
    .chart-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-top: 4px; }
    .chart-wrap canvas { max-height: 220px; }
    .chart-toggle { font-size: 11px; color: var(--accent); cursor: pointer; background: none; border: 1px solid var(--accent); border-radius: 4px; padding: 2px 8px; margin-left: 6px; }

    /* ── Tool Status ── */
    .tool-status { text-align: center; color: var(--text3); font-size: 13px; padding: 8px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Input ── */
    .input-area { border-top: 1px solid var(--border); padding: 12px 20px; flex-shrink: 0; background: var(--bg); }
    .input-bar { display: flex; gap: 8px; max-width: 760px; margin: 0 auto; align-items: flex-end; }
    .input-bar textarea { flex: 1; padding: 10px 14px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; color: var(--text); font-size: 14px; outline: none; resize: none; min-height: 42px; max-height: 120px; font-family: inherit; line-height: 1.5; }
    .input-bar textarea:focus { border-color: var(--accent); }
    .send-btn { width: 42px; height: 42px; background: var(--accent); border: none; border-radius: 50%; font-size: 17px; cursor: pointer; flex-shrink: 0; color: #fff; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── DB Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 50; }
    .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px; padding: 28px; width: 380px; display: flex; flex-direction: column; gap: 12px; }
    .modal h3 { color: var(--accent); font-size: 16px; }
    .modal input { padding: 9px 12px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); font-size: 13px; outline: none; }
    .modal input:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btn { padding: 8px 18px; border-radius: 7px; border: none; font-size: 13px; cursor: pointer; }
    .modal-btn.primary { background: var(--accent); color: #fff; }
    .modal-btn.cancel { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }

    /* ── Notifications ── */
    #notifContainer { position: fixed; top: 16px; right: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 200; }
    .notif { background: var(--bg2); border: 1px solid var(--accent); border-radius: 10px; padding: 12px 16px; font-size: 13px; color: var(--text); max-width: 300px; box-shadow: 0 4px 20px var(--shadow); animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .db-bar { padding: 6px 12px; }
      .chat-window { padding: 12px; gap: 14px; }
      .message-body { max-width: 92%; }
      .input-area { padding: 10px 12px; }
      .header { padding: 10px 14px; }
      .header-right .icon-btn span { display: none; }
      .logo { font-size: 15px; }
    }
    @media (max-width: 400px) {
      .login-box { width: 92vw; padding: 28px 20px; }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  </style>
</head>
<body>

<!-- Login -->
<div id="loginOverlay">
  <div class="login-box">
    <h2>✦ HealthX AI</h2>
    <p>Sign in to continue</p>
    <input type="text" id="loginUser" placeholder="Username" />
    <input type="password" id="loginPass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()" />
    <div class="login-error" id="loginError">Invalid credentials</div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <p style="font-size:11px;color:var(--text3);text-align:center">Default: admin / admin123</p>
  </div>
</div>

<!-- Notifications -->
<div id="notifContainer"></div>

<!-- DB Add Modal -->
<div id="dbModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h3>➕ Add Database</h3>
    <input id="dbName" placeholder="Name (e.g. Production)" />
    <input id="dbHost" placeholder="Host (e.g. 127.0.0.1)" />
    <input id="dbPort" placeholder="Port (default: 3306)" type="number" />
    <input id="dbUser" placeholder="Username" />
    <input id="dbPass" placeholder="Password" type="password" />
    <input id="dbDatabase" placeholder="Database name" />
    <div id="dbTestStatus" style="display:none" class="db-test-status"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeDbModal()">Cancel</button>
      <button class="modal-btn cancel" onclick="testDbConnection()" id="testBtn">🔌 Test</button>
      <button class="modal-btn primary" onclick="saveDb()" id="saveDbBtn" disabled style="opacity:0.4">Save</button>
    </div>
  </div>
</div>

<!-- ER Diagram Modal -->
<div id="erModal" class="modal-overlay" style="display:none;padding:0;background:rgba(0,0,0,0.85);">
  <div style="width:96vw;height:92vh;border-radius:14px;overflow:hidden;border:1px solid rgba(0,200,255,0.2);box-shadow:0 0 60px rgba(0,200,255,0.1);position:relative;">
    <button onclick="closeErDiagram()" style="position:absolute;top:10px;right:14px;z-index:999;background:rgba(0,0,0,0.6);border:1px solid rgba(0,200,255,0.3);color:#00c8ff;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:12px;font-family:monospace;backdrop-filter:blur(6px);">✕ Close</button>
    <iframe id="erFrame" src="" style="width:100%;height:100%;border:none;border-radius:14px;"></iframe>
  </div>
</div>

<!-- Alert Modal -->
<div id="alertModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h3>🔔 Add Query Alert</h3>
    <input id="alertName" placeholder="Alert name (e.g. High Orders)" />
    <input id="alertQuery" placeholder="SQL query (e.g. SELECT COUNT(*) as n FROM orders)" />
    <input id="alertCondition" placeholder="Condition (e.g. n > 10)" />
    <input id="alertInterval" placeholder="Check every X minutes (e.g. 5)" type="number" />
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="document.getElementById('alertModal').style.display='none'">Cancel</button>
      <button class="modal-btn primary" onclick="saveAlert()">Add Alert</button>
    </div>
  </div>
</div>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">✦ HealthX AI</div>
      <div style="width:8px;height:8px;border-radius:50%;background:#4caf50;flex-shrink:0"></div>
      <span style="font-size:12px;color:var(--text3)">Groq llama-3.3-70b</span>
    </div>
    <div class="header-right">
      <button class="icon-btn" onclick="openErDiagram()">🗺️ <span>ER Diagram</span></button>
      <button class="icon-btn" onclick="toggleTheme()">🌙 <span id="themeLabel">Dark</span></button>
      <button class="icon-btn" onclick="exportChat()">📤 <span>Export</span></button>
      <div class="user-badge" id="userBadge">👤 admin</div>
      <button class="icon-btn" onclick="logout()" style="color:#e05555">⏻</button>
    </div>
  </div>

  <!-- DB Bar -->
  <div class="db-bar">
    <span class="db-label">🗄️ Database:</span>
    <div id="dbChips"></div>
    <button class="db-add" onclick="openDbModal()">+ Add DB</button>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        Chat History
        <button class="new-chat-btn" onclick="newChat()" title="New chat">＋</button>
      </div>
      <div class="history-list" id="historyList"></div>

      <!-- Alerts -->
      <div class="alerts-panel">
        <div class="alerts-title">
          🔔 Alerts
          <button class="alert-add" onclick="document.getElementById('alertModal').style.display='flex'">+ Add</button>
        </div>
        <div id="alertsList"></div>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-area">
      <div class="chat-window" id="chatWindow">
        <div class="empty-state" id="emptyState">
          <h2>✦ How can I help?</h2>
          <p>Ask anything about your database in plain English</p>
          <div class="suggestions">
            <button class="suggestion" onclick="setInput('Show all tables')">Show all tables</button>
            <button class="suggestion" onclick="setInput('How many users are there?')">How many users?</button>
            <button class="suggestion" onclick="setInput('List all orders with status')">List all orders</button>
            <button class="suggestion" onclick="setInput('Show me a chart of orders by status')">Chart orders</button>
            <button class="suggestion" onclick="setInput('Describe the users table')">Describe users table</button>
            <button class="suggestion" onclick="setInput('Which users signed up this month?')">Recent signups</button>
          </div>
        </div>
      </div>
      <div class="input-area">
        <div class="input-bar">
          <textarea id="messageInput" placeholder="Ask anything about your database..." rows="1"
            oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────
const BACKEND = 'http://localhost:3001';
const USERS = { admin: 'admin123', healthx: 'health2024' };

// ── State ──────────────────────────────────────────────
let isLoading = false;
let currentUser = null;
let currentChatId = null;
let allChats = {};       // { id: { title, messages: [] } }
let databases = [];      // [{ name, host, port, user, pass, database }]
let activeDbIndex = 0;
let alerts = [];         // [{ name, query, condition, interval, timerId }]
let chartInstances = {}; // canvas id → Chart instance
let isDark = true;

// ── Boot ───────────────────────────────────────────────
window.onload = () => {
  const saved = localStorage.getItem('hx_user');
  if (saved) { currentUser = saved; showApp(); }

  // Load persisted data
  allChats   = JSON.parse(localStorage.getItem('hx_chats') || '{}');
  databases  = JSON.parse(localStorage.getItem('hx_dbs')   || '[]');
  alerts     = JSON.parse(localStorage.getItem('hx_alerts')|| '[]');
  isDark     = localStorage.getItem('hx_theme') !== 'light';

  applyTheme();
  renderDbChips();
  renderHistory();
  renderAlerts();
  restartAlertTimers();

  // Add default DB if none
  if (databases.length === 0) {
    databases.push({ name: 'Local (Docker)', host: '127.0.0.1', port: 3306,
      user: 'healthx_user', pass: 'healthx_pass', database: 'healthx_db' });
    saveState();
    renderDbChips();
  }
};

// ── Auth ───────────────────────────────────────────────
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (USERS[u] && USERS[u] === p) {
    currentUser = u;
    localStorage.setItem('hx_user', u);
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('userBadge').textContent = '👤 ' + u;
    showApp();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function logout() {
  localStorage.removeItem('hx_user');
  location.reload();
}

function showApp() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('userBadge').textContent = '👤 ' + currentUser;
}

// ── Theme ──────────────────────────────────────────────
function toggleTheme() {
  isDark = !isDark;
  applyTheme();
  localStorage.setItem('hx_theme', isDark ? 'dark' : 'light');
}
function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('themeLabel').textContent = isDark ? 'Dark' : 'Light';
}

// ── DB Management ──────────────────────────────────────
const dbStatus = {}; // index → 'connected' | 'error' | 'pending'

function renderDbChips() {
  const c = document.getElementById('dbChips');
  c.innerHTML = databases.map((db, i) => {
    const status = dbStatus[i] || 'pending';
    return `<div class="db-chip ${i===activeDbIndex?'active':''}" onclick="switchDb(${i})">
      <div class="db-status-dot ${status}"></div>
      ${db.name}
      ${i > 0 ? `<span class="db-chip-del" onclick="removeDb(event,${i})">✕</span>` : ''}
    </div>`;
  }).join('');
}

async function switchDb(i) {
  activeDbIndex = i;
  renderDbChips();
  // Verify connection on switch
  const db = databases[i];
  try {
    const res = await fetch(`${BACKEND}/test-db`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ db })
    });
    const data = await res.json();
    if (data.status === 'connected') {
      dbStatus[i] = 'connected';
      notify(`✅ Connected to ${db.name}`);
    } else {
      dbStatus[i] = 'error';
      notify(`❌ ${db.name}: ${data.message}`);
    }
  } catch(e) {
    dbStatus[i] = 'error';
    notify(`❌ Cannot reach backend`);
  }
  renderDbChips();
}

function removeDb(e, i) {
  e.stopPropagation();
  if (!confirm(`Remove "${databases[i].name}"?`)) return;
  databases.splice(i, 1);
  delete dbStatus[i];
  if (activeDbIndex >= databases.length) activeDbIndex = 0;
  saveState(); renderDbChips();
}

function openDbModal() {
  document.getElementById('dbModal').style.display='flex';
  document.getElementById('dbTestStatus').style.display='none';
  document.getElementById('saveDbBtn').disabled = true;
  document.getElementById('saveDbBtn').style.opacity = '0.4';
  ['dbName','dbHost','dbPort','dbUser','dbPass','dbDatabase'].forEach(id => {
    document.getElementById(id).value = '';
  });
}
function closeDbModal() { document.getElementById('dbModal').style.display='none'; }

async function testDbConnection() {
  const host = document.getElementById('dbHost').value.trim();
  if (!host) { notify('Enter a host first'); return; }

  const db = {
    host,
    port: parseInt(document.getElementById('dbPort').value) || 3306,
    user: document.getElementById('dbUser').value,
    pass: document.getElementById('dbPass').value,
    database: document.getElementById('dbDatabase').value
  };

  const statusEl = document.getElementById('dbTestStatus');
  const testBtn = document.getElementById('testBtn');
  statusEl.style.display = 'block';
  statusEl.className = 'db-test-status testing';
  statusEl.textContent = '⏳ Testing connection...';
  testBtn.disabled = true;

  try {
    const res = await fetch(`${BACKEND}/test-db`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ db })
    });
    const data = await res.json();
    if (data.status === 'connected') {
      statusEl.className = 'db-test-status ok';
      statusEl.textContent = `✅ ${data.message}`;
      document.getElementById('saveDbBtn').disabled = false;
      document.getElementById('saveDbBtn').style.opacity = '1';
    } else {
      statusEl.className = 'db-test-status fail';
      statusEl.textContent = `❌ ${data.message}`;
    }
  } catch(e) {
    statusEl.className = 'db-test-status fail';
    statusEl.textContent = `❌ Cannot reach backend: ${e.message}`;
  }
  testBtn.disabled = false;
}

async function saveDb() {
  const name = document.getElementById('dbName').value.trim();
  const host = document.getElementById('dbHost').value.trim();
  if (!name || !host) { notify('Name and host are required'); return; }

  const db = {
    name, host,
    port: parseInt(document.getElementById('dbPort').value) || 3306,
    user: document.getElementById('dbUser').value,
    pass: document.getElementById('dbPass').value,
    database: document.getElementById('dbDatabase').value
  };

  databases.push(db);
  const newIndex = databases.length - 1;
  dbStatus[newIndex] = 'connected'; // already tested
  activeDbIndex = newIndex;         // auto-switch to new DB

  saveState(); renderDbChips(); closeDbModal();
  notify(`🗄️ Switched to "${name}"`);
}

// ── Chat History ───────────────────────────────────────
function saveState() {
  localStorage.setItem('hx_chats', JSON.stringify(allChats));
  localStorage.setItem('hx_dbs', JSON.stringify(databases));
  localStorage.setItem('hx_alerts', JSON.stringify(alerts.map(a => ({...a, timerId: null}))));
}

function newChat() {
  currentChatId = 'chat_' + Date.now();
  allChats[currentChatId] = { title: 'New Chat', messages: [] };
  saveState(); renderHistory();
  document.getElementById('chatWindow').innerHTML = `<div class="empty-state" id="emptyState">
    <h2>✦ How can I help?</h2><p>Ask anything about your database in plain English</p>
    <div class="suggestions">
      <button class="suggestion" onclick="setInput('Show all tables')">Show all tables</button>
      <button class="suggestion" onclick="setInput('How many users?')">How many users?</button>
      <button class="suggestion" onclick="setInput('List all orders')">List all orders</button>
      <button class="suggestion" onclick="setInput('Show me a chart of orders by status')">Chart orders</button>
    </div></div>`;
}

function loadChat(id) {
  currentChatId = id;
  renderHistory();
  const chat = allChats[id];
  const cw = document.getElementById('chatWindow');
  cw.innerHTML = '';
  chartInstances = {};
  chat.messages.forEach(m => {
    if (m.role === 'user') addUserMessage(m.content);
    else addAssistantMessage(m.content, m.tableData, m.chartData);
  });
}

function deleteChat(id, e) {
  e.stopPropagation();
  delete allChats[id];
  if (currentChatId === id) newChat();
  saveState(); renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const ids = Object.keys(allChats).reverse();
  if (ids.length === 0) { list.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--text3);text-align:center">No chats yet</div>'; return; }
  list.innerHTML = ids.map(id => `
    <div class="history-item ${id===currentChatId?'active':''}" onclick="loadChat('${id}')">
      ${allChats[id].title}
      <span class="history-item-del" onclick="deleteChat('${id}',event)">✕</span>
    </div>`).join('');
}

// ── Alerts ─────────────────────────────────────────────
function renderAlerts() {
  const el = document.getElementById('alertsList');
  if (alerts.length === 0) { el.innerHTML = '<div style="font-size:11px;color:var(--text3);padding:4px">No alerts set</div>'; return; }
  el.innerHTML = alerts.map((a,i) => `
    <div class="alert-item">
      <span>🔔 ${a.name}</span>
      <span style="cursor:pointer;color:var(--text3)" onclick="removeAlert(${i})">✕</span>
    </div>`).join('');
}

function saveAlert() {
  const name = document.getElementById('alertName').value.trim();
  const query = document.getElementById('alertQuery').value.trim();
  const condition = document.getElementById('alertCondition').value.trim();
  const mins = parseInt(document.getElementById('alertInterval').value) || 5;
  if (!name || !query) return;
  alerts.push({ name, query, condition, interval: mins, timerId: null });
  saveState(); renderAlerts();
  startAlertTimer(alerts.length - 1);
  document.getElementById('alertModal').style.display = 'none';
  notify(`Alert "${name}" set — checks every ${mins} min`);
}

function removeAlert(i) {
  if (alerts[i].timerId) clearInterval(alerts[i].timerId);
  alerts.splice(i, 1);
  saveState(); renderAlerts();
}

function restartAlertTimers() {
  alerts.forEach((_, i) => startAlertTimer(i));
}

function startAlertTimer(i) {
  const a = alerts[i];
  if (a.timerId) clearInterval(a.timerId);
  a.timerId = setInterval(async () => {
    try {
      const res = await fetch(`${BACKEND}/tool`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tool: 'query', args: { sql: a.query }, db: databases[activeDbIndex] })
      });
      const data = await res.json();
      const rows = JSON.parse(data.result);
      if (rows && rows[0]) {
        const vals = Object.values(rows[0]);
        const val = vals[0];
        if (a.condition) {
          const key = Object.keys(rows[0])[0];
          const triggered = eval(a.condition.replace(key, val).replace(Object.keys(rows[0])[0], val));
          if (triggered) notify(`🔔 Alert: ${a.name} triggered! Value: ${val}`, 8000);
        } else {
          notify(`🔔 ${a.name}: ${val}`);
        }
      }
    } catch(e) {}
  }, a.interval * 60 * 1000);
}

// ── Notifications ──────────────────────────────────────
function notify(msg, duration = 3000) {
  const c = document.getElementById('notifContainer');
  const el = document.createElement('div');
  el.className = 'notif';
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(100%)'; el.style.transition = '0.3s'; setTimeout(() => el.remove(), 300); }, duration);
}

// ── UI Helpers ─────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function setInput(text) {
  const inp = document.getElementById('messageInput');
  inp.value = text; inp.focus(); autoResize(inp);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function addUserMessage(text) {
  hideEmpty();
  const cw = document.getElementById('chatWindow');
  const div = document.createElement('div');
  div.className = 'message user';
  div.innerHTML = `<div class="avatar">👤</div><div class="message-body"><div class="content">${escHtml(text)}</div></div>`;
  cw.appendChild(div);
  scrollBottom();
}

function addAssistantMessage(text, tableData, chartData) {
  hideEmpty();
  const cw = document.getElementById('chatWindow');
  const id = 'msg_' + Date.now();
  const div = document.createElement('div');
  div.className = 'message';
  div.innerHTML = `<div class="avatar">✦</div><div class="message-body">
    <div class="content" id="${id}">${escHtml(text)}</div>
  </div>`;
  cw.appendChild(div);

  const body = div.querySelector('.message-body');

  if (tableData && tableData.length > 0) {
    body.appendChild(buildTable(tableData));
  }
  if (chartData && chartData.labels && chartData.values) {
    body.appendChild(buildChart(chartData));
  }
  scrollBottom();
  return id;
}

function hideEmpty() {
  const e = document.getElementById('emptyState');
  if (e) e.style.display = 'none';
}

function scrollBottom() {
  const cw = document.getElementById('chatWindow');
  cw.scrollTop = cw.scrollHeight;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Table Renderer ─────────────────────────────────────
function buildTable(rows) {
  if (!rows || rows.length === 0) return document.createElement('div');
  const keys = Object.keys(rows[0]);
  const wrap = document.createElement('div');
  wrap.className = 'result-table-wrap';
  const tableId = 'tbl_' + Date.now();

  let html = `<table class="result-table" id="${tableId}"><thead><tr>`;
  keys.forEach(k => html += `<th>${escHtml(k)}</th>`);
  html += '</tr></thead><tbody>';
  rows.forEach(row => {
    html += '<tr>';
    keys.forEach(k => html += `<td>${escHtml(row[k] ?? '')}</td>`);
    html += '</tr>';
  });
  html += `</tbody></table>
    <div class="table-footer">
      <span class="table-count">${rows.length} row${rows.length!==1?'s':''}</span>
      <button class="export-btn" onclick="exportCSV('${tableId}')">⬇ CSV</button>
    </div>`;
  wrap.innerHTML = html;
  return wrap;
}

// ── Chart Renderer ─────────────────────────────────────
function buildChart(chartData) {
  const wrap = document.createElement('div');
  wrap.className = 'chart-wrap';
  const cid = 'chart_' + Date.now();
  wrap.innerHTML = `<canvas id="${cid}"></canvas>`;
  setTimeout(() => {
    const ctx = document.getElementById(cid);
    if (!ctx) return;
    if (chartInstances[cid]) chartInstances[cid].destroy();
    chartInstances[cid] = new Chart(ctx, {
      type: chartData.type || 'bar',
      data: {
        labels: chartData.labels,
        datasets: [{
          label: chartData.label || 'Results',
          data: chartData.values,
          backgroundColor: ['#e8a87c','#7cb8e8','#a8e87c','#e87ca8','#c87ce8','#7ce8c8'].slice(0, chartData.labels.length),
          borderRadius: 6, borderWidth: 0
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y ?? ctx.parsed}` } } },
        scales: chartData.type === 'pie' ? {} : {
          x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#888' } },
          y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#888' } }
        }
      }
    });
  }, 50);
  return wrap;
}

// ── CSV Export ─────────────────────────────────────────
function exportCSV(tableId) {
  const table = document.getElementById(tableId);
  if (!table) return;
  const rows = [...table.querySelectorAll('tr')];
  const csv = rows.map(r => [...r.querySelectorAll('th,td')].map(c => `"${c.textContent}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'healthx_export_' + Date.now() + '.csv'; a.click();
  notify('CSV exported!');
}

function exportChat() {
  if (!currentChatId || !allChats[currentChatId]) return;
  const chat = allChats[currentChatId];
  const text = chat.messages.map(m => `[${m.role.toUpperCase()}]\n${m.content}`).join('\n\n---\n\n');
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'chat_' + Date.now() + '.txt'; a.click();
  notify('Chat exported!');
}

// ── Try parse JSON result into rows ───────────────────
function tryParseRows(str) {
  try {
    const data = JSON.parse(str);
    if (Array.isArray(data) && data.length > 0 && typeof data[0] === 'object') return data;
  } catch(e) {}
  return null;
}

// ── Auto-detect chart data from rows ──────────────────
function tryBuildChartData(rows, userMsg) {
  if (!rows || rows.length === 0) return null;
  const keys = Object.keys(rows[0]);
  if (keys.length < 2) return null;
  const labelKey = keys[0];
  const valueKey = keys.find(k => k !== labelKey && !isNaN(parseFloat(rows[0][k])));
  if (!valueKey) return null;
  const wantsChart = /chart|graph|plot|visuali/i.test(userMsg);
  if (!wantsChart && rows.length > 20) return null; // only auto-chart if asked or small result
  const type = /pie/i.test(userMsg) ? 'pie' : 'bar';
  return {
    type, label: valueKey,
    labels: rows.map(r => String(r[labelKey])),
    values: rows.map(r => parseFloat(r[valueKey]) || 0)
  };
}

// ── Send Message ───────────────────────────────────────
async function sendMessage() {
  const inp = document.getElementById('messageInput');
  const text = inp.value.trim();
  if (!text || isLoading) return;

  if (!currentChatId) newChat();

  inp.value = ''; inp.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  // Save user msg
  allChats[currentChatId].messages.push({ role: 'user', content: text });
  if (allChats[currentChatId].title === 'New Chat') {
    allChats[currentChatId].title = text.slice(0, 36) + (text.length > 36 ? '…' : '');
  }
  saveState(); renderHistory();
  addUserMessage(text);

  // Placeholder assistant msg
  const cw = document.getElementById('chatWindow');
  const placeholder = document.createElement('div');
  placeholder.className = 'message';
  placeholder.innerHTML = `<div class="avatar">✦</div><div class="message-body"><div class="content" id="streaming_content"><span style="color:var(--text3)">●●●</span></div></div>`;
  cw.appendChild(placeholder);
  scrollBottom();

  const streamingEl = document.getElementById('streaming_content');
  let fullText = '';
  let lastToolResult = null;
  let lastToolName = '';

  try {
    const history = allChats[currentChatId].messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }));
    const response = await fetch(`${BACKEND}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [...history, { role: 'user', content: text }],
        db: databases[activeDbIndex]
      })
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value);
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));

          if (data.type === 'text') {
            if (streamingEl.querySelector('span')) streamingEl.innerHTML = '';
            fullText += data.content;
            streamingEl.textContent = fullText;
            scrollBottom();
          }
          if (data.type === 'tool_start') {
            addToolStatus(`🔧 Calling: ${data.tool}...`);
          }
          if (data.type === 'tool_running') {
            addToolStatus(`⚙️ Running: ${data.tool}`);
            lastToolName = data.tool;
          }
          if (data.type === 'tool_result') {
            clearToolStatus();
            lastToolResult = data.result;
            lastToolName = data.tool;
          }
          if (data.type === 'done') {
            clearToolStatus();
            // Render table + chart if we got query results
            let tableData = null;
            let chartData = null;
            if (lastToolResult && (lastToolName === 'query' || lastToolName === 'list_tables' || lastToolName === 'describe_table')) {
              tableData = tryParseRows(lastToolResult);
              if (tableData) chartData = tryBuildChartData(tableData, text);
            }
            // Replace placeholder with final message
            const body = placeholder.querySelector('.message-body');
            streamingEl.id = 'msg_' + Date.now();
            if (tableData && tableData.length > 0) body.appendChild(buildTable(tableData));
            if (chartData) body.appendChild(buildChart(chartData));

            // Save to history
            allChats[currentChatId].messages.push({ role: 'assistant', content: fullText, tableData, chartData });
            saveState();

            isLoading = false;
            document.getElementById('sendBtn').disabled = false;
            inp.focus();
          }
          if (data.type === 'error') {
            clearToolStatus();
            streamingEl.textContent = `❌ ${data.message}`;
            isLoading = false;
            document.getElementById('sendBtn').disabled = false;
          }
        } catch(e) {}
      }
    }
  } catch(err) {
    clearToolStatus();
    streamingEl.textContent = `❌ Connection error: ${err.message}`;
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

function addToolStatus(text) {
  let el = document.getElementById('toolStatus');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toolStatus';
    el.className = 'tool-status';
    document.getElementById('chatWindow').appendChild(el);
  }
  el.textContent = text;
  scrollBottom();
}

function clearToolStatus() {
  const el = document.getElementById('toolStatus');
  if (el) el.remove();
}

// ── ER Diagram ─────────────────────────────────────────
function openErDiagram() {
  const modal = document.getElementById('erModal');
  const frame = document.getElementById('erFrame');

  // Pass active DB config + backend URL into the iframe via URL params
  // The ER diagram page reads window.BACKEND_URL and window.DB_CONFIG injected via postMessage
  const db = databases[activeDbIndex];
  const erUrl = '/er-diagram.html';
  frame.src = erUrl;

  // Once iframe loads, inject config
  frame.onload = () => {
    try {
      frame.contentWindow.BACKEND_URL = BACKEND;
      frame.contentWindow.DB_CONFIG   = db;
      // Trigger schema load
      frame.contentWindow.loadSchema();
    } catch(e) {
      // cross-origin fallback: pass via query string encoded
    }
  };
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeErDiagram() {
  document.getElementById('erModal').style.display = 'none';
  document.getElementById('erFrame').src = '';
  document.body.style.overflow = '';
}
// Close on backdrop click
document.getElementById('erModal')?.addEventListener('click', function(e) {
  if (e.target === this) closeErDiagram();
});

// Init on load
window.addEventListener('load', () => {
  if (!currentChatId) newChat();
});
</script>
